<!doctype html>
<html><head><meta charset="utf-8"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:1200px;height:630px;background:#0d0d0d;color:#fff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:72px 80px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
.eyebrow{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:22px;letter-spacing:.12em;text-transform:uppercase;color:#8a8881}
.eyebrow .dot{color:#4ade80}
h1{font-size:64px;font-weight:700;line-height:1.14;letter-spacing:-.02em;max-width:1020px;margin-top:28px}
h1 em{font-style:normal;color:#4ade80}
.bottom{display:flex;justify-content:space-between;align-items:flex-end;gap:24px}
.stats{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:24px;color:#c3c2b7;line-height:1.6}
.stats .p{color:#4ade80}
.url{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:24px;color:#4ade80}
</style></head>
<body>
  <div>
    <div class="eyebrow">pricefixed <span class="dot">·</span> open tools <span class="dot">·</span> rent transparency</div>
    <h1>The rent number on your lease was not set by a person. <em>It was set by software.</em></h1>
  </div>
  <div class="bottom">
    <div class="stats"><span class="p">$</span> python3 scrape.py<br>12 live feeds · 6,401 listings · SQLite · MIT</div>
    <div class="url">pricefixed.polyfeeds.dev</div>
  </div>
</body></html>
